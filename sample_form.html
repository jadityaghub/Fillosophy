<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Job Application Form</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f9fafb; color: #111827; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        h1 { margin-top: 0; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #4f46e5; ring: 2px solid #4f46e5; }
        .btn { background: #4f46e5; color: white; padding: 12px 20px; border: none; border-radius: 6px; font-weight: 500; cursor: pointer; width: 100%; font-size: 16px; }
        .btn:hover { background: #4338ca; }
    </style>
</head>
<body>
    <div class="card">
        <h1>TechCorp Engineering Application</h1>
        <p style="color: #6b7280; font-size: 14px; margin-bottom: 24px;">Please fill out the details below to apply for the Software Engineer position.</p>
        
        <form id="application-form">
            <div class="form-group">
                <label for="applicant_name">Full Legal Name</label>
                <input type="text" id="applicant_name" name="applicant_name" placeholder="e.g. Jane Doe">
            </div>

            <div class="form-group">
                <label for="contact_email">Email Address</label>
                <input type="email" id="contact_email" name="contact_email" placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number (with country code)</label>
                <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000">
            </div>

            <div class="form-group">
                <label for="degree_info">Highest Degree Earned</label>
                <select id="degree_info" name="degree_info">
                    <option value="">Select a degree</option>
                    <option value="bachelors">Bachelor's Degree</option>
                    <option value="masters">Master's Degree</option>
                    <option value="phd">PhD</option>
                </select>
            </div>

            <div class="form-group">
                <label for="gpa_score">Cumulative GPA / CGPA</label>
                <input type="text" id="gpa_score" name="gpa_score" placeholder="e.g. 3.8 or 9.5">
            </div>

            <div class="form-group">
                <label for="top_skills">Primary Technical Skills</label>
                <textarea id="top_skills" name="top_skills" rows="3" placeholder="List your top programming languages and frameworks..."></textarea>
            </div>

            <button type="submit" class="btn">Submit Application</button>
        </form>
    </div>
</body>
</html>
