# Render Blueprint Specification for Fillosophy Backend
services:
  - type: web
    name: fillosophy-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: MOCK_AI
        value: "false"
      - key: DEFAULT_PROVIDER
        value: "groq"
      - key: ANTHROPIC_API_KEY
        sync: false # Set manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false # Set manually in Render dashboard
